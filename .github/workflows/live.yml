name: Live Registry Conformance

# Queries IANA and the RIR RDAP servers for real. Kept off pull requests so a
# registry outage or rate limit cannot fail unrelated work.
on:
    schedule:
        - cron: "0 7 * * *"
    workflow_dispatch:

permissions:
    contents: read

env:
    NODE_VERSION: "20"

jobs:
    conformance:
        name: Live Conformance
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Query live registries
              run: pnpm test:live
